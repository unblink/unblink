name: Discord Notify

on:
  push:
    branches:
      - main
      - master

jobs:
  discord-notify:
    runs-on: ubuntu-latest
    steps:
      - name: Send Discord webhook
        run: |
          curl -X POST "${{ secrets.DISCORD_WEBHOOK }}" \
            -H "Content-Type: application/json" \
            -d '{
              "content": "",
              "embeds": [{
                "title": "🚀 New Push to ${{ github.repository }}",
                "description": "**Branch:** `${{ github.ref_name }}`\n**Commit:** `${{ github.sha }}`\n**Author:** ${{ github.actor }}\n\n[View Changes](${{ github.event.head_commit.url }})",
                "color": 5814783,
                "fields": [
                  {"name": "Message", "value": "${{ github.event.head_commit.message }}", "inline": false}
                ],
                "footer": {"text": "GitHub Actions"},
                "timestamp": "${{ github.event.head_commit.timestamp }}"
              }]
            }'
